<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>OpenDomain | Settings</title>
</head>
<body>
    <div class="container">
        <h1>Ustawienia</h1>
        <div class="status-row">
            <span id="statusDot" class="dot"></span>
            <span id="statusText">system nieaktywny</span>
        </div>

            <div class="section">
                <div class="switch-row">
                    <div>
                        <p class="title">ODNS Resolver</p>
                        <p class="desc">Obsługa dodatkowych domen</p>
                    </div>

                    <label class="switch" aria-label="Włącz ODNS">
                        <input type="checkbox" id="toggle" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="switch-row">
    <div>
        <p class="title">Wersja beta</p>
        <p class="desc">Uczestnicz w testach beta funkcji</p>
    </div>

    <label class="switch">
        <input type="checkbox" id="betaToggle">
        <span class="slider"></span>
    </label>
</div>

            <div class="section">
                <label class="field">
                    <p class="title">Resolver URL</p>
                    <input id="resolverUrl" class="input" type="text" placeholder="https://resolver.odns.dev" />
                </label>
            </div>

            <div class="section">
                <label class="field">
                    <p class="title">Dodatkowe domeny</p>
                    <p class="desc">Wklej jedną domenę na linię (np. example.sus)</p>
                    <textarea id="extraDomains" class="textarea" placeholder="example.sus, {ID-Server}, {ID-Owner}"></textarea>
                </label>
            </div>

            <div class="controls">
                <button class="btn primary" id="saveBtn" type="button">Zapisz</button>
                <button class="btn ghost" id="resetBtn" type="button">Resetuj</button>
            </div>

            <div id="toast" style="display:none; margin-top:10px; font-size:13px; color:var(--muted)"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
